name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/**'
      - 'mkdocs.yml'
      - 'scripts/**'
      - 'pyproject.toml'

  workflow_dispatch:

  repository_dispatch:
    types: [dispatch-event]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Clone external repos & sync docs
        run: uv run python scripts/sync_docs.py --token ${{ secrets.GH_PAT }}

      - name: Build site
        run: uv run mkdocs build
        env:
          GA_ID: ${{ secrets.GA_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
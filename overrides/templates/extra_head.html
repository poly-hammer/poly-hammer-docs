{# Google Analytics (gtag.js) #}
{% if config.extra.analytics and config.extra.analytics.id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ config.extra.analytics.id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ config.extra.analytics.id }}');
</script>
{% endif %}

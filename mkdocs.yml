site_name: Poly Hammer Documentation
site_description: Comprehensive documentation for Poly Hammer's tools and platform.
site_url: "https://docs.polyhammer.com/"
site_dir: site
repo_url: "https://github.com/poly-hammer/poly-hammer-docs"

watch:
  - overrides

nav:
  - Home: index.md
  - Hammer Build Tool:
    - Setup: hammer-build-tool/setup.md
    - Create Releases: hammer-build-tool/create-releases.md
  # BEGIN EXTERNAL DOCS
  - Character DNA Addon:
    - Quick Start: character-dna/index.md
    - Terminology: character-dna/terminology.md
    - Helpful Resources: character-dna/helpful-resources.md
    - Unreal Configuration: character-dna/unreal-configuration.md
    - Textures: character-dna/textures.md
    - User Interface:
      - Import: character-dna/user-interface/import.md
      - Face Board: character-dna/user-interface/face-board.md
      - Utilities: character-dna/user-interface/utilities.md
      - View Options: character-dna/user-interface/view-options.md
      - Rig Logic: character-dna/user-interface/rig-logic.md
      - Shape Keys: character-dna/user-interface/shape-keys.md
      - Output: character-dna/user-interface/output.md
    - Workflows:
      - Face Form Wrap: character-dna/workflows/face-form-wrap.md
    - Contributing:
      - Development: character-dna/contributing/development.md
      - Documentation: character-dna/contributing/documentation.md
      - Testing: character-dna/contributing/testing.md
  # END EXTERNAL DOCS

theme:
  name: shadcn
  custom_dir: overrides
  icon: assets/poly-hammer-icon-light.svg
  favicon: assets/favicon.ico
  show_title: true
  topbar_sections: false
  katex_options: {}
  pygments_style:
    light: shadcn-light
    dark: github-dark

hooks:
  - scripts/hooks.py

plugins:
  - search

extra:
  analytics:
    id: !ENV GA_ID

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - js/theme-icon.js
  - js/particles-init.js
  - js/glowing-cursor.js

markdown_extensions:
  - admonition
  - codehilite
  - fenced_code
  - footnotes
  - attr_list
  - pymdownx.tabbed
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.smartsymbols
  - pymdownx.tasklist
  - pymdownx.magiclink
